server.port=8080

spring.application.name=hospital-fridge-backend
spring.datasource.url=jdbc:h2:file:./data/hospital-fridge-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

mqtt.enabled=true
mqtt.broker-url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client-id=${MQTT_CLIENT_ID:hospital-fridge-backend}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.topic=${MQTT_TOPIC:hospital/fridges/+/telemetry}
mqtt.connection-timeout-seconds=10
mqtt.keep-alive-seconds=30
